<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - BizPulse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #007BFF;
            color: white;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
        }

        .sidebar.collapsed {
            width: 60px;
        }

        .sidebar h2 {
            text-align: center;
            margin: 20px 0;
            font-size: 22px;
            transition: opacity 0.3s;
        }

        .sidebar.collapsed h2 {
            opacity: 0;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            margin: 5px 0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .sidebar a i {
            width: 20px;
            text-align: center;
        }

        .sidebar a:hover {
            background: #0056b3;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            margin: 10px;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 30px;
            transition: margin-left 0.3s;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            background: white;
            flex: 1 1 250px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            color: #007BFF;
            font-size: 28px;
            margin: 10px 0;
        }

        .card p {
            color: #555;
            font-size: 16px;
        }

        .card a.button {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #007BFF;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }
        .card a.button:hover {
            background: #0056b3;
        }

        @media(max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
            }
            .sidebar a {
                flex: 0 0 auto;
                margin: 0 5px;
            }
            .main {
                padding: 15px;
            }
        }

    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">
            <i class="fa fa-bars"></i>
        </button>
        <h2>BizPulse</h2>
        <a href="{{ url_for('dashboard') }}"><i class="fa fa-home"></i><span class="label">Dashboard</span></a>
        <a href="{{ url_for('profile') }}"><i class="fa fa-user"></i><span class="label">Profile</span></a>
        <a href="{{ url_for('projects') }}"><i class="fa fa-folder"></i><span class="label">Projects</span></a>
        <a href="{{ url_for('reports') }}"><i class="fa fa-chart-bar"></i><span class="label">Reports</span></a>
        <a href="{{ url_for('logout') }}"><i class="fa fa-sign-out-alt"></i><span class="label">Logout</span></a>
    </div>

    <div class="main" id="main">
        <h1>Welcome, {{ user.username }}</h1>
        <div class="cards">
            <div class="card">
                <h2>{{ total_users }}</h2>
                <p>Total Users</p>
            </div>
            <div class="card">
                <h2>{{ total_projects }}</h2>
                <p>Your Projects</p>
                <a href="{{ url_for('projects') }}" class="button">View Projects</a>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }
    </script>
</body>
</html>
