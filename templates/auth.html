<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BizPulse - Auth</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            padding: 50px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #007BFF;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .tab {
            text-align: center;
            margin: 15px 0;
        }
        .tab button {
            width: 48%;
            display: inline-block;
            margin: 0 1%;
            background: #6c757d;
        }
        .tab button.active {
            background: #007BFF;
        }
        .message {
            text-align: center;
            color: red;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>BizPulse</h2>

        {% if message %}
        <div class="message">{{ message }}</div>
        {% endif %}

        <div class="tab">
            <button id="loginTab" class="{{ 'active' if tab=='login' else '' }}" onclick="showTab('login')">Login</button>
            <button id="registerTab" class="{{ 'active' if tab=='register' else '' }}" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" method="POST" style="display: {{ 'block' if tab=='login' else 'none' }}">
            <input type="text" name="username_or_email" placeholder="Username or Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="hidden" name="action" value="login">
            <button type="submit">Login</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" method="POST" style="display: {{ 'block' if tab=='register' else 'none' }}">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="hidden" name="action" value="register">
            <button type="submit">Register</button>
        </form>
    </div>

    <script>
        function showTab(tabName) {
            document.getElementById('loginForm').style.display = tabName === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tabName === 'register' ? 'block' : 'none';
            document.getElementById('loginTab').classList.toggle('active', tabName === 'login');
            document.getElementById('registerTab').classList.toggle('active', tabName === 'register');
        }
    </script>
</body>
</html>
